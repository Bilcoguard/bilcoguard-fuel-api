<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Bilcoguard Fuel Delivery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --royal: #2E3192;
      --sky: #00BFFF;
      --grey: #A7A8AB;
      --off-white: #F1F1F1;
      --dark: #1a1d6e;
      --success: #2ecc71;
      --warning: #f39c12;
      --danger: #e74c3c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', -apple-system, sans-serif;
      background: #0f0f23;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* iOS Phone Frame */
    .phone {
      width: 390px;
      height: 844px;
      max-height: 100vh;
      background: var(--off-white);
      border-radius: 44px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 80px rgba(46,49,146,0.3), 0 0 0 8px #1a1a2e, 0 0 0 10px #333;
    }

    /* Notch */
    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 34px;
      background: #000;
      border-radius: 0 0 22px 22px;
      z-index: 100;
    }
    .notch::after {
      content: '';
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #1a1a2e;
    }

    /* Status Bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 28px 4px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      position: relative;
      z-index: 50;
    }

    /* Home Indicator */
    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      border-radius: 3px;
      background: rgba(0,0,0,0.15);
      z-index: 100;
    }

    /* Screen container */
    .screen-container {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .screen {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: none;
    }
    .screen.active { display: flex; flex-direction: column; }

    /* Tab Bar */
    .tab-bar {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 0 24px;
      background: #fff;
      border-top: 1px solid var(--off-white);
      position: relative;
      z-index: 50;
      flex-shrink: 0;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      border: none;
      background: none;
      cursor: pointer;
      padding: 4px 12px;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-item .icon { font-size: 22px; }
    .tab-item .label { font-size: 10px; color: var(--grey); font-family: 'Poppins'; font-weight: 400; }
    .tab-item.active .label { color: var(--sky); font-weight: 600; }
    .tab-item .dot { width: 4px; height: 4px; border-radius: 2px; background: transparent; margin-top: 1px; }
    .tab-item.active .dot { background: var(--sky); }

    /* Header with geometric bg */
    .header-geo {
      position: relative;
      padding: 16px 20px 36px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .header-geo .bg {
      position: absolute;
      inset: 0;
      background: var(--royal);
    }
    .header-geo .bg::before {
      content: '';
      position: absolute;
      top: -20px;
      right: -30px;
      width: 150px;
      height: 150px;
      background: var(--sky);
      opacity: 0.1;
      transform: rotate(45deg);
    }
    .header-geo .bg::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: -20px;
      width: 100px;
      height: 100px;
      background: var(--sky);
      opacity: 0.08;
      transform: rotate(30deg);
    }
    .header-geo .content { position: relative; z-index: 1; }

    /* Cards */
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(46,49,146,0.08);
      border-top: 3px solid var(--sky);
      padding: 16px;
    }
    .card.no-border { border-top: none; }
    .card.dark {
      background: linear-gradient(135deg, var(--royal), var(--dark));
      border-top: none;
    }

    /* Buttons */
    .btn {
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-family: 'Poppins';
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary { background: var(--sky); color: #fff; }
    .btn-royal { background: var(--royal); color: #fff; }
    .btn-outline { background: transparent; color: var(--royal); border: 2px solid var(--royal); }
    .btn-full { width: 100%; }
    .btn:active { transform: scale(0.97); opacity: 0.9; }

    /* Inputs */
    .input-group { margin-bottom: 14px; }
    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--royal);
      margin-bottom: 6px;
    }
    .input-group input, .input-group select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--off-white);
      border-radius: 12px;
      font-family: 'Poppins';
      font-size: 14px;
      color: var(--royal);
      background: #fff;
      transition: border-color 0.2s;
    }
    .input-group input:focus, .input-group select:focus {
      outline: none;
      border-color: var(--sky);
    }

    /* Animations */
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-in { animation: slideUp 0.3s ease-out; }

    /* Live map */
    .live-map {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(46,49,146,0.12);
      position: relative;
      cursor: pointer;
      transition: height 0.3s ease;
    }
    .live-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(46,49,146,0.85);
      backdrop-filter: blur(8px);
      padding: 4px 10px;
      border-radius: 10px;
      z-index: 5;
    }
    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 3px;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: pulse 2s infinite;
    }
    .speed-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      padding: 4px 8px;
      border-radius: 8px;
      text-align: center;
      z-index: 5;
    }

    /* Scrollable content */
    .scroll-content {
      padding: 0 20px 20px;
      position: relative;
      z-index: 2;
      margin-top: -20px;
      flex: 1;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--royal);
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      z-index: 1000;
      animation: slideUp 0.3s ease-out;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    /* Loading spinner */
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--off-white);
      border-top-color: var(--sky);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Range slider */
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      background: var(--off-white);
      border-radius: 3px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--sky);
      cursor: pointer;
      border: 3px solid #fff;
      box-shadow: 0 2px 6px rgba(0,191,255,0.3);
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
      flex: 1;
    }

    @media (max-width: 420px) {
      .phone { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; }
      .notch { display: none; }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="status-bar">
      <span>9:41</span>
      <div style="display:flex; gap:6px; align-items:center;">
        <span style="font-size:10px;">5G</span>
        <span style="font-size:10px;">📶</span>
        <span style="font-size:10px;">🔋</span>
      </div>
    </div>

    <div class="screen-container" id="app">
      <!-- Screens injected by JS -->
    </div>

    <div class="tab-bar" id="tabBar">
      <button class="tab-item active" data-tab="home">
        <span class="icon">⛽</span>
        <span class="label">Home</span>
        <span class="dot"></span>
      </button>
      <button class="tab-item" data-tab="schedule">
        <span class="icon">📅</span>
        <span class="label">Schedule</span>
        <span class="dot"></span>
      </button>
      <button class="tab-item" data-tab="vehicles">
        <span class="icon">🚗</span>
        <span class="label">Vehicles</span>
        <span class="dot"></span>
      </button>
      <button class="tab-item" data-tab="tracking">
        <span class="icon">📍</span>
        <span class="label">Track</span>
        <span class="dot"></span>
      </button>
      <button class="tab-item" data-tab="profile">
        <span class="icon">👤</span>
        <span class="label">Profile</span>
        <span class="dot"></span>
      </button>
    </div>

    <div class="home-indicator"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
